name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Project targets Python 3.11; use that version for consistency
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pre-commit install

      - name: Run pre-commit hooks
        continue-on-error: true
        run: |
          pre-commit run --all-files

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml -q

      - name: Coverage gate (F-P0-1: core modules ≥ targets, overall ≥80%)
        run: |
          python scripts/coverage_check.py --fail-under 80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true

      - name: Build Docker image
        run: |
          docker build -t audiobook-studio:latest .

      # Optional: Log in to Docker Hub and push the image (requires secrets)
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker tag audiobook-studio:latest ${{ secrets.DOCKERHUB_USERNAME }}/audiobook-studio:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/audiobook-studio:latest

      - name: Test Docker image
        run: |
          # Run container in background
          docker run -d --name ci-audiobook -p 8000:8000 audiobook-studio:latest
          # Wait for the app to start (simple sleep, could be improved)
          sleep 5
          # Check health endpoint
          if curl -sSf http://localhost:8000/health; then
            echo "✅ Docker container /health endpoint passed"
          else
            echo "❌ Docker container /health endpoint failed"
            docker stop ci-audiobook
            docker rm ci-audiobook
            exit 1
          fi
          # Verify DB connection via /health/db or similar endpoint
          if curl -sSf http://localhost:8000/health/db; then
            echo "✅ Docker container DB connection verified"
          else
            echo "❌ Docker container DB connection failed"
            docker stop ci-audiobook
            docker rm ci-audiobook
            exit 1
          fi
          # Stop and remove container
          docker stop ci-audiobook
          docker rm ci-audiobook

      - name: Generate health report
        run: |
          chmod +x scripts/generate_health_report.sh
          ./scripts/generate_health_report.sh

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: project-health
          path: PROJECT_HEALTH.md

  quality-gate:
    name: Quality Gate (F-P0-2, F-P0-3)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # F-P0-2: Golden dataset regression automation
      - name: Run golden dataset validation
        id: golden
        run: |
          python -m pytest tests/golden/test_golden_dataset.py \
            -v \
            --tb=short \
            --junit-xml=golden-results.xml
          echo "golden_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check golden dataset pass rate (≥95%)
        if: steps.golden.outputs.golden_exit_code == '0'
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('golden-results.xml')
          root = tree.getroot()
          failures = int(root.get('failures', 0))
          errors = int(root.get('errors', 0))
          total = int(root.get('tests', 0))
          passed = total - failures - errors
          pass_rate = passed / total if total > 0 else 0
          print(f'Golden dataset: {passed}/{total} passed ({pass_rate:.1%})')
          if pass_rate < 0.95:
              print(f'❌ Golden dataset pass rate {pass_rate:.1%} < 95%')
              exit(1)
          print('✅ Golden dataset pass rate ≥ 95%')
          "

      # F-P0-3: Contract compliance rate auto-check (≥99%)
      - name: Generate compliance report from test runs
        run: |
          python scripts/coverage_check.py --output reports/coverage_baseline.json
          # The test runs in lint-and-test already populate compliance data
          # Export final compliance report
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from audiobook_studio.monitoring.compliance import ComplianceMonitor
          monitor = ComplianceMonitor(storage_path='./reports/compliance')
          # Compliance data is accumulated during test runs
          monitor.export_report('./reports/compliance/compliance_report_latest.json')
          print('Overall compliance rate:', monitor.get_overall_compliance_rate())
          "

      - name: Contract compliance check (≥99%)
        run: |
          python scripts/contract_compliance_check.py \
            --threshold 0.99 \
            --report ./reports/compliance/compliance_report_latest.json \
            --fail-on-error

      # LLM router fallback rate check (from existing quality-gate)
      - name: Run LLM router tests to check fallback rate
        id: fallback
        run: |
          python -m pytest tests/test_llm_router.py \
            -v \
            --tb=short \
            --junit-xml=router-results.xml
          echo "fallback_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check fallback rate (≤5%)
        if: steps.fallback.outputs.fallback_exit_code == '0'
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('router-results.xml')
          root = tree.getroot()
          failures = int(root.get('failures', 0))
          errors = int(root.get('errors', 0))
          total = int(root.get('tests', 0))

          # Read fallback rate from metrics JSON
          import json, os, glob, datetime
          today = datetime.date.today().strftime("%Y%m%d")
          metrics_file = f"logs/metrics_{today}.json"
          if os.path.exists(metrics_file):
              with open(metrics_file) as f:
                  d = json.load(f)
              fallback_rate = d.get("fallback_rate", 0.0)
          else:
              fallback_rate = 0.0
          print(f'Fallback rate: {fallback_rate:.1%}')
          if fallback_rate > 0.05:
              print(f'❌ Fallback rate {fallback_rate:.1%} > 5%')
              exit(1)
          print('✅ Fallback rate ≤ 5%')
          "

      - name: Check compliance rate (≥99%)
        run: |
          python -c "
          import json, os, datetime
          today = datetime.date.today().strftime('%Y%m%d')
          metrics_file = f'logs/metrics_{today}.json'
          if os.path.exists(metrics_file):
              with open(metrics_file) as f:
                  d = json.load(f)
              compliance_rate = d.get('compliance_rate', 0.0)
          else:
              compliance_rate = 0.0
          print(f'Compliance rate: {compliance_rate:.1%}')
          if compliance_rate < 0.99:
              print(f'❌ Compliance rate {compliance_rate:.1%} < 99%')
              exit(1)
          print('✅ Compliance rate ≥ 99%')
          "

      - name: Check contract version
        run: |
          python -c "
          import json, os
          contract_file = 'config/contract_version.json'
          if os.path.exists(contract_file):
              with open(contract_file) as f:
                  d = json.load(f)
              version = d.get('version', 'unknown')
              print(f'Contract version: {version}')
          else:
              print('❌ Contract version file not found')
              exit(1)
          "

      - name: Run latency benchmarks
        run: |
          python scripts/bench_latency.py --output reports/bench_latency.json
          echo 'Latency benchmark completed'

      - name: Run cost benchmarks
        run: |
          python scripts/bench_cost.py --output reports/bench_cost.json
          echo 'Cost benchmark completed'

      - name: Upload quality gate results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results
          path: |
            golden-results.xml
            router-results.xml
            reports/compliance/compliance_report_latest.json

  # Optional: Deploy step can be added here