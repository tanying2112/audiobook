[pytest]
# Disable schemathesis plugin for unit tests to avoid hypothesis_jsonschema compatibility issues
addopts = -p no:schemathesis
pythonpath = src

norecursedirs = .* build dist *.egg-info voxcpm2-pool
ignore = voxcpm2-pool

filterwarnings =
    ignore::DeprecationWarning:SwigPyPacked
    ignore::DeprecationWarning:SwigPyObject
    ignore::DeprecationWarning:swigvarlink