# OpenTelemetry Collector Configuration for Audiobook Studio
# Receives traces/metrics from app, exports to Prometheus and Grafana

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']

exporters:
  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: audiobook
    const_labels:
      service: audiobook-studio

  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true

  logging:
    loglevel: debug

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 500
    spike_limit_mib: 100

  resource:
    attributes:
      - key: service.name
        value: "audiobook-studio"
        action: upsert
      - key: service.version
        value: "0.1.0"
        action: upsert
      - key: deployment.environment
        value: "development"
        action: upsert

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [logging, otlp]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus, logging]
  telemetry:
    logs:
      level: info
    metrics:
      level: basic
      address: 0.0.0.0:8888