# Prometheus Configuration for Audiobook Studio
# Scrapes metrics from the application and OTel collector

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'audiobook-studio'
    environment: 'development'

scrape_configs:
  # Audiobook Studio application metrics
  - job_name: 'audiobook-studio'
    static_configs:
      - targets: ['host.docker.internal:9090']  # App exposes /metrics on port 9090
    metrics_path: '/metrics'
    scrape_interval: 10s

  # OTel Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (if available)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']