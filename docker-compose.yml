version: "3.9"

services:
  app:
    build: .
    command: uvicorn audiobook_studio.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://audiobook:audiobook@db:5432/audiobook
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUDIO_OUTPUT_DIR=/app/output
      - CHECKPOINTS_DIR=/app/checkpoints
      - PYTHONPATH=/app/src
    volumes:
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    volumes:
      - ./web:/app
    profiles:
      - dev

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=audiobook
      - POSTGRES_PASSWORD=audiobook
      - POSTGRES_DB=audiobook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiobook -d audiobook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
