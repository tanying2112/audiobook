version: "3.9"

services:
  # Backend Web instance.
  # Service name "web" is referenced by ci.yml (compose-test / stress-test:
  # `docker compose run --rm web ...`, `docker compose up -d db redis web`).
  web:
    build: .
    command: ["uvicorn", "audiobook_studio.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://audiobook:audiobook@db:5432/audiobook
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUDIO_OUTPUT_DIR=/app/output
      - CHECKPOINTS_DIR=/app/checkpoints
      - PYTHONPATH=/app/src
      # Celery broker / result backend (web enqueues export + pipeline tasks).
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # LLM provider keys optional at runtime; defaults keep env_checker
      # --fail-on-warning self-consistent in CI (non-empty placeholder only).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key-not-real}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-test-key-not-real}
      # Task 6.1 asset-stripping: model cache points at the Docker volume (see Dockerfile).
      - AUDIOBOOK_STUDIO_MODEL_CACHE=/app/models_cache
    volumes:
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
      - ./storage:/app/storage
      - ./logs:/app/logs
      - models_cache:/app/models_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    volumes:
      - ./web:/app
    profiles:
      - dev

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=audiobook
      - POSTGRES_PASSWORD=audiobook
      - POSTGRES_DB=audiobook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiobook -d audiobook"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Celery broker / result backend (celery_app.py reads $REDIS_URL).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Celery worker instance.
  # Task 6.2 — reserved production entrypoint alongside the web instance.
  # ci.yml raises it via `docker compose --profile worker up -d celery-worker`.
  celery-worker:
    build: .
    command: ["celery", "-A", "src.audiobook_studio.celery_app", "worker", "-l", "info", "-Q", "export,pipeline", "--concurrency=1"]
    environment:
      - DATABASE_URL=postgresql://audiobook:audiobook@db:5432/audiobook
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key-not-real}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-test-key-not-real}
      - AUDIOBOOK_STUDIO_MODEL_CACHE=/app/models_cache
    volumes:
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
      - ./storage:/app/storage
      - ./logs:/app/logs
      - models_cache:/app/models_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    profiles:
      - worker

volumes:
  postgres_data:
  # Task 6.1 资产剥离: shared named volume for large model assets — never baked into the image.
  models_cache:
