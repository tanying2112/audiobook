# LLM Provider Configuration - 增量扩展模式
# 新增提供商只需在 providers 下追加，无需改动代码
# 优先级由 priority 决定，数值越小优先级越高

providers:
  # OpenRouter (Qwen3 80B) - 免费，已验证可用
  - name: openrouter
    provider: openrouter
    model: qwen/qwen3-next-80b-a3b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    api_key_pool_env:
      - OPENROUTER_API_KEY_1
    priority: 5
    max_tokens_per_minute: 5000
    max_requests_per_minute: 20
    stages: [extract, analyze, annotate, annotate_paragraph, edit, judge, translate]
    enabled: true

  # NVIDIA NIM (MiniMax M2.7) - 免费，已验证可用 (openai/ prefix + base_url)
  - name: nvidia_nemotron
    provider: openai
    model: minimaxai/minimax-m2.7
    api_key_env: NVIDIA_API_KEY
    api_key_pool_env:
      - NVIDIA_API_KEY_1
    base_url: https://integrate.api.nvidia.com/v1
    priority: 10
    max_tokens_per_minute: 4000
    max_requests_per_minute: 20
    stages: [extract, analyze, annotate, annotate_paragraph, edit, judge, translate]
    enabled: true

  # OpenCode Zen - 首选的 OpenAI 兼容路由，极速稳定 (当前连接异常，暂禁用)
  - name: opencode_zen
    provider: openai
    model: deepseek-v4-flash-free
    api_key_env: OPENCODE_ZEN_API_KEY
    base_url: https://api.opencode-zen.com/v1
    priority: 15
    max_tokens_per_minute: 50000
    max_requests_per_minute: 100
    stages: [extract, analyze, annotate, annotate_paragraph, edit, judge, translate]
    enabled: false

  # Cerebras - 极速推理 (placeholder key，暂禁用)
  - name: cerebras
    provider: cerebras
    model: llama-3.3-70b
    api_key_env: CEREBRAS_API_KEY
    base_url: https://api.cerebras.ai/v1
