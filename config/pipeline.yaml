# Audiobook Studio Pipeline Configuration
# Central configuration for quality thresholds, constitutional rules, difficulty weights,
# voice mapping, and promotion thresholds. Supports hot-reload - changes take effect without restart.

# =============================================================================
# Alert Thresholds
# Thresholds for triggering alerts across the pipeline
# =============================================================================
alert_thresholds:
  # Kill switch - triggered when critical pipeline failure occurs
  killswitch_triggered:
    enabled: true
    severity: "critical"

  # Provider quota exhausted
  provider_quota_exhausted:
    enabled: true
    severity: "high"
    # Alert when provider reports quota exceeded
    trigger_on_error: true

  # Quality score degradation
  quality_score_degraded:
    enabled: true
    severity: "medium"
    # Alert when quality score drops below this threshold
    min_quality_score: 0.70
    # Alert when quality score drops by this percentage from baseline
    degradation_pct: 15.0
    # Minimum samples before checking
    min_samples: 10

  # Synthesis failure rate high
  synthesis_failure_rate_high:
    enabled: true
    severity: "high"
    # Alert when failure rate exceeds this percentage
    max_failure_rate_pct: 10.0
    # Time window in minutes to evaluate
    window_minutes: 15
    # Minimum samples in window
    min_samples: 5

  # Cost budget exceeded
  cost_budget_exceeded:
    enabled: true
    severity: "high"
    # Alert when daily cost exceeds this percentage of budget
    budget_pct_threshold: 80.0
    # Alert when projected monthly cost exceeds budget
    projected_monthly_threshold: 90.0
    # Daily budget in USD (overridable by env)
    daily_budget_usd: 50.0

  # Latency regression
  latency_regression:
    enabled: true
    severity: "medium"
    # Alert when latency exceeds this percentage above baseline p95
    latency_pct_above_p95: 50.0
    # Minimum samples before checking
    min_samples: 10

  # Schema compliance drop
  schema_compliance_drop:
    enabled: true
    severity: "high"
    # Alert when compliance rate drops below this threshold
    min_compliance_rate: 0.95
    # Time window in minutes
    window_minutes: 30
    min_samples: 20

# =============================================================================
# Alert Notification Channels
# Configuration for where alerts are sent
# =============================================================================
alert_channels:
  # Console logging (always available)
  console:
    enabled: true
    level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

  # Webhook notifications (Slack, Discord, PagerDuty, generic)
  webhooks:
    enabled: false
    # Slack webhook URL (set via ALERT_SLACK_WEBHOOK env var)
    slack_webhook_url: "${ALERT_SLACK_WEBHOOK}"
    # Discord webhook URL (set via ALERT_DISCORD_WEBHOOK env var)
    discord_webhook_url: "${ALERT_DISCORD_WEBHOOK}"
    # PagerDuty Events API v2 integration key (set via ALERT_PAGERDUTY_KEY env var)
    pagerduty_integration_key: "${ALERT_PAGERDUTY_KEY}"
    # Generic webhook URL (set via ALERT_GENERIC_WEBHOOK env var)
    generic_webhook_url: "${ALERT_GENERIC_WEBHOOK}"
    # Custom headers for generic webhook (JSON string)
    generic_webhook_headers: "{}"
    # Timeout for webhook requests in seconds
    timeout_seconds: 10
    # Retry configuration
    max_retries: 3
    retry_backoff_base: 2.0

  # Email notifications (SMTP)
  email:
    enabled: false
    smtp_host: "${ALERT_SMTP_HOST}"
    smtp_port: 587
    smtp_username: "${ALERT_SMTP_USERNAME}"
    smtp_password: "${ALERT_SMTP_PASSWORD}"
    from_email: "${ALERT_FROM_EMAIL}"
    to_emails: ["${ALERT_TO_EMAIL}"]
    use_tls: true
    # Timeout for SMTP connection in seconds
    timeout_seconds: 30
    # Retry configuration
    max_retries: 3
    retry_backoff_base: 2.0

# =============================================================================
# Alert Deduplication
# Configuration to prevent alert spam
# =============================================================================
alert_deduplication:
  enabled: true
  # Time window in seconds to deduplicate identical alerts
  window_seconds: 300
  # Maximum number of identical alerts to keep in history
  max_history: 1000
  # Group alerts by these fields for deduplication
  group_by: ["alert_type", "provider", "stage"]

# =============================================================================
# Alert Retry Logic
# Configuration for retry with exponential backoff
# =============================================================================
alert_retry:
  max_retries: 3
  base_backoff_seconds: 2.0
  max_backoff_seconds: 60.0
  backoff_multiplier: 2.0
  # Jitter factor (0.0-1.0) to add randomness to backoff
  jitter_factor: 0.1

# =============================================================================
# Quality Thresholds
# Audio quality detection thresholds for rule-based checks
# =============================================================================
quality_thresholds:
  # Silence detection threshold in dB (below this is considered silence)
  silence_threshold_db: -40

  # Clipping threshold as ratio (0.0-1.0). > this ratio of samples at max amplitude = clipping
  clipping_threshold: 0.001

  # Minimum segment duration in milliseconds (segments shorter than this are flagged)
  min_duration_ms: 100

  # Maximum segment duration in milliseconds
  max_duration_ms: 30000

  # Volume normalization target in dB RMS
  volume_normalization_target_db: -20

  # Low volume warning threshold in dB
  low_volume_threshold_db: -30

  # High volume warning threshold in dB
  high_volume_threshold_db: -1

  # Duration match threshold percentage (generated vs expected)
  duration_match_threshold_percent: 30

  # Sample rate for audio analysis
  sample_rate: 22050

  # Acceptable noise floor in dB
  noise_floor_db: -50


# =============================================================================
# Constitutional Rules
# Fundamental principles guiding all LLM outputs and system behaviors
# These are hot-reloadable - changes take effect without restarting the system
# =============================================================================
constitutional_rules:
  # Character consistency enforcement
  character_consistency:
    # Minimum consistency score for same character across segments (0-1)
    min_consistency_score: 0.9
    # Enable voice binding verification
    verify_voice_binding: true
    # Consecutive wrong speaker detections before triggering review
    wrong_speaker_consecutive_threshold: 3
    # Allowable voice drift per chapter (0-1)
    max_voice_drift_per_chapter: 0.05

  # Emotion coherence enforcement
  emotion_coherence:
    # Minimum emotion match score (0-1)
    min_emotion_match: 0.80
    # Maximum allowed emotion mismatch ratio before triggering prompt upgrade
    max_mismatch_ratio: 0.20
    # Require emotion context continuity
    require_context_continuity: true
    # Allowed emotion intensity deviation (0-1)
    max_intensity_deviation: 0.15

  # Text normalization rules
  text_norms:
    # Chinese language standards
    chinese:
      # Avoid mixing English in Chinese text
      avoid_english_mixing: true
      # Allow classical Chinese expressions (ratio 0-1)
      classical_modern_balance: 0.3
      # Normalize punctuation to full-width
      normalize_punctuation: true
      # Convert traditional to simplified
      traditional_to_simplified: true

    # English language standards
    english:
      # Avoid unnecessary pinyin in English text
      avoid_chinese_pinyin: true
      # Formal/informal must match scene context
      formality_match_context: true
      # Normalize contractions based on formality
      normalize_contractions: true

    # General text processing
    general:
      # Maximum consecutive repeated characters
      max_consecutive_repeats: 3
      # Remove zero-width characters
      strip_zero_width: true
      # Normalize whitespace
      normalize_whitespace: true
      # Maximum segment length in characters
      max_segment_chars: 500
      # Minimum segment length in characters
      min_segment_chars: 10


# =============================================================================
# Difficulty Weights
# Weights for calculating paragraph/chapter difficulty scores
# Used for routing, cost estimation, and quality expectations
# =============================================================================
difficulty_weights:
  # Character count weight (normalized by log scale)
  char_count_weight: 0.30

  # Dialect/slang ratio weight (0-1 ratio of non-standard tokens)
  dialect_ratio_weight: 0.25

  # Terminology density weight (specialized terms per 100 chars)
  term_density_weight: 0.20

  # Emotion complexity weight (number of distinct emotions)
  emotion_complexity_weight: 0.15

  # Speaker count weight (number of distinct speakers in segment)
  speaker_count_weight: 0.10

  # Base difficulty offset (added to weighted sum)
  base_difficulty: 0.1

  # Difficulty tier thresholds
  difficulty_tiers:
    easy: 0.3      # Below this: simple narration
    medium: 0.5    # Below this: standard dialogue
    hard: 0.7      # Below this: complex multi-speaker
    expert: 1.0    # Above this: expert-only content


