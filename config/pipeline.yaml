# =============================================================================
# Promotion Thresholds
# Criteria for promoting models/voices to production based on quality metrics
# =============================================================================
promotion_thresholds:
  # Minimum quality score delta required for promotion (vs current production)
  # Positive value means new model must be better by this margin
  quality_score_delta: 0.02

  # Golden dataset regression baseline
  # New model must not regress more than this on golden dataset
  golden_regression_baseline:
    # Maximum allowed regression in overall quality score (0-1)
    max_quality_regression: 0.01
    # Maximum allowed regression in speaker clarity (0-1)
    max_speaker_clarity_regression: 0.02
    # Maximum allowed regression in emotion match (0-1)
    max_emotion_match_regression: 0.02
    # Maximum allowed regression in prosody naturalness (0-1)
    max_prosody_regression: 0.02
    # Maximum allowed regression in text-audio alignment (0-1)
    max_alignment_regression: 0.02
    # Maximum allowed increase in error rate (0-1)
    max_error_rate_increase: 0.005
    # Minimum sample size for golden dataset evaluation
    min_evaluation_samples: 50

  # Cost efficiency thresholds
  cost_efficiency:
    # Maximum allowed cost increase ratio for promotion (1.0 = no increase allowed)
    max_cost_increase_ratio: 1.1
    # Minimum cost savings required for "cost-optimized" promotion
    min_cost_savings_ratio: 0.85

  # Latency thresholds
  latency:
    # Maximum allowed latency increase ratio for promotion
    max_latency_increase_ratio: 1.2
    # Target latency for "fast" tier (ms)
    fast_tier_target_ms: 2000
    # Target latency for "quality" tier (ms)
    quality_tier_target_ms: 5000

  # Stability requirements
  stability:
    # Minimum success rate for promotion (0-1)
    min_success_rate: 0.99
    # Maximum consecutive failures allowed
    max_consecutive_failures: 2
    # Required evaluation period in hours before promotion
    evaluation_period_hours: 24

  # A/B testing thresholds
  ab_testing:
    # Minimum traffic percentage for canary
    min_canary_traffic_pct: 5
    # Maximum traffic percentage for canary
    max_canary_traffic_pct: 50
    # Minimum experiment duration in hours
    min_experiment_duration_hours: 4
    # Statistical significance threshold (p-value)
    significance_threshold: 0.05
    # Minimum detectable effect size
    min_effect_size: 0.01