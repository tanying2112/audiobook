[mypy]
strict = True
explicit_package_bases = True
ignore_missing_imports = True
disable_error_code = import-untyped

# ── Experimental modules (gradual migration) ────────────────────────────────

[mypy-src.audiobook_studio.collaboration.*]
disable_error_code = misc,arg-type,attr-defined,no-untyped-call,no-untyped-def,type-arg,assignment

[mypy-src.audiobook_studio.translation.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,assignment,valid-type,attr-defined,operator

[mypy-src.audiobook_studio.publish.*]
disable_error_code = no-untyped-def,name-defined,arg-type,attr-defined

[mypy-src.audiobook_studio.tts.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,assignment

# ── Core modules with known type gaps ────────────────────────────────────────

[mypy-src.audiobook_studio.monitoring.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,index,union-attr,no-any-return

[mypy-src.audiobook_studio.audio_quality]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.observability.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,valid-type,return-value

[mypy-src.audiobook_studio.pipeline.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.llm.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.api.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.models.*]
disable_error_code = no-untyped-def,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.schemas.*]
disable_error_code = no-untyped-def,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.auth.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.config.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type

[mypy-src.audiobook_studio.export.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type

[mypy-src.audiobook_studio.quality.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type

# ── Single-file overrides ────────────────────────────────────────────────────

[mypy-src.audiobook_studio.main]
disable_error_code = no-untyped-def,var-annotated,arg-type

[mypy-src.audiobook_studio.database]
disable_error_code = no-untyped-def,var-annotated,arg-type

[mypy-src.audiobook_studio.di]
disable_error_code = no-untyped-def,var-annotated,arg-type,assignment

[mypy-src.audiobook_studio.exceptions]
disable_error_code = no-untyped-def,var-annotated,arg-type

[mypy-src.audiobook_studio.storage]
disable_error_code = no-untyped-def,var-annotated,arg-type

[mypy-src.audiobook_studio.middleware.*]
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,arg-type

[mypy-src.audiobook_studio.prompts.*]
