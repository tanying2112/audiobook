[mypy]
strict = True
explicit_package_bases = True
ignore_missing_imports = True
disable_error_code = import-untyped

[mypy-src.audiobook_studio.collaboration.*]
# Team collaboration has complex type issues, relax for now
disable_error_code = misc,arg-type,attr-defined,no-untyped-call,no-untyped-def,type-arg,assignment,comparison-overlap,call-arg,index

[mypy-src.audiobook_studio.translation.*]
# Translation module needs gradual migration
disable_error_code = no-untyped-def,no-untyped-call,var-annotated,assignment,valid-type,attr-defined,operator

