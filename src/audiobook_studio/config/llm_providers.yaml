# LLM Provider Configuration - 增量扩展模式
# 新增提供商只需在 providers 下追加,无需改动代码
# 优先级由 priority 决定,数值越小优先级越高

providers:
  # P0: Gemini 2.0 Flash - 云端主力 (免费额度高、速度快)
  # 需要设置 GEMINI_API_KEY 环境变量
  - name: gemini_2_0_flash
    provider: gemini
    model: gemini-2.0-flash
    api_key_env: GEMINI_API_KEY
    priority: 10
    max_tokens_per_minute: 100000
    max_requests_per_minute: 60
    max_daily_cost_usd: 0.0  # 免费额度内为 0
    timeout_seconds: 30
    stages: [analyze]
    enabled: true

  # P1: 本地 Ollama (llama3.1:8b / qwen2.5:14b 等) - 离线兜底、无限制
  # 优先级 20，仅在 Gemini 失败/限流时自动切换
  # 需要本地运行: ollama serve
  - name: ollama_local
    provider: ollama
    model: llama3.1:8b
    base_url: http://localhost:11434
    priority: 20
    max_tokens_per_minute: 100000
    max_requests_per_minute: 100
    timeout_seconds: 0  # 0 = 无超时 (本地模型)
    max_daily_cost_usd: 0.0
    stages: [analyze]
    enabled: true

  # 兼容性保留: gemma4:e2b (原首选)
  - name: ollama_gemma4_e2b
    provider: ollama
    model: gemma4:e2b
    base_url: http://localhost:11434
    priority: 30
    max_tokens_per_minute: 100000
    max_requests_per_minute: 100
    timeout_seconds: 0
    stages: [extract, analyze, annotate, annotate_paragraph, edit, judge, translate]
    enabled: true

# Prompt 压缩策略 - 激进模式以适应 TPM 限制
prompt_compression:
  max_input_tokens: 4000
  truncate_strategy: smart
  remove_few_shot_when_long: true
  min_few_shot_examples: 0
  schema_injection_mode: minimal

# 降级策略
fallback:
  max_retries_per_provider: 1
  retry_on_rate_limit: true
  retry_on_timeout: true
  timeout_seconds: 45
  exponential_backoff_base: 1.5

# 成本控制
cost_control:
  daily_limit_usd: 10.0
  alert_threshold: 0.8
  track_per_stage: true